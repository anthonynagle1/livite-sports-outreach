# ─── Constants ───
payroll_tax_rate: 3.00     # $/hr per employee (employer-side)
food_cost_pct: 0.35        # 35% of revenue
earliest_date: "2024-11-07"  # First day of Toast data in Azure

# ─── Channel Map ───
# Toast "Dining Options" value → Tracker column name
channel_map:
  "DoorDash - Delivery": "DD Delivery"
  "DoorDash - Takeout": "DD Takeout"
  "Grubhub - Delivery": "GH Delivery"
  "Grubhub - Takeout": "GH Takeout"
  "Online Ordering - Takeout": "Online"
  "Online Ordering - Delivery": "Online Ordering - Delivery"
  "Phone": "Phone"
  "To Go": "To Go"
  "Uber Eats - Delivery": "Uber Delivery"
  "Uber Eats - Takeout": "Uber Takeout"
  "Catering Delivery": "Catering Delivery"
  "E-Gift Cards": "E-Gift Cards"
  "Delivery": "Delivery"

# ─── Employee Aliases ───
# Toast sometimes uses different name spellings.
# Format: "toast spelling, as it appears" → "master table spelling"
