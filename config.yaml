    first_name: "Meire"
    last_name: "Medeiros"
    gusto_id: ""  # TODO: get Meire's Gusto employee ID
    hours: 40
    notion_db: "2d042679f1a3807da756d93f50cac98a"
  # Social media bonus rate for Danielle Cohen
  danielle_sm_rate: 19.00

# ─── Fixed Costs ───
# Daily fixed cost schedule. Entries are checked newest-first; first match wins.
# date: YYYYMMDD cutoff. "amount" is the daily fixed cost from that date onward.
fixed_costs:
  schedule:
    - date: "20260216"
      amount: 850        # From Feb 16 2026 onwards: $850/day
  default: 1150           # Before any cutoff

# ─── Locations ───
# Multi-location support. Default location used for invoices and P&L.
locations:
  brookline:
    name: "Brookline"
    active: true
    default: true

# ─── Daily Email Report ───
# Automatically emails yesterday's dashboard every morning.
# Uses existing Google OAuth credentials (GOOGLE_CLIENT_ID, etc.) from .env.
# Sends from your Gmail (anthonynagle13@gmail.com) via Gmail API.
daily_email:
  enabled: true
  send_time: "08:00"  # Eastern Time
  recipients:
    - anthony@livite.com
