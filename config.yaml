# ─── Master Wage Table ───
# Source of truth for employee pay rates. Toast wages are often wrong.
# Keys: lowercase "last, first" to match Toast's Employee column format.
# Types: hourly, manager, owner
# gusto_id: Gusto employee identifier for payroll CSV export
# tips: true/false — whether employee participates in tip pool
# ot_rate: manager OT rate for hours over 50/week (manager type only)
#
# When a new employee is hired: add them here.
# When a wage changes: update the wage value.
# When someone leaves: you can remove them or leave them (no harm).
