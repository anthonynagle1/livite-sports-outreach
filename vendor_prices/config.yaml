categories:
  - Protein
  - Produce
  - Dairy
  - Dry Goods
  - Beverages
  - Paper & Supplies
  - Cleaning
  - Equipment
  - Other

normalization:
  auto_match_threshold: 0.85
  review_threshold: 0.50
  batch_size: 20

email_rules:
  baldor:
    display_name: "Baldor"
    sender: "statements@baldorfood.com"
    subject_contains: "invoice"
    attachment_types: ["pdf"]
  sysco:
    display_name: "Sysco"
    sender: "noreply@sysco.com"
    subject_contains: "invoice"
    attachment_types: ["pdf"]
