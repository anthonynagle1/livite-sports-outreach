    display_name: "Sysco"
    color: "#1a5276"
  baldor:
    display_name: "Baldor"
    color: "#27ae60"
  freshpoint:
    display_name: "FreshPoint"
    color: "#e67e22"
  restaurant_depot:
    display_name: "Restaurant Depot"
    color: "#c0392b"

unit_aliases:
  "cs": "case"
  "ca": "case"
  "ea": "each"
  "#": "lb"
  "lbs": "lb"
  "gal": "gallon"
  "bg": "bag"
  "bx": "box"
  "pk": "pack"
