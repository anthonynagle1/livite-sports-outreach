services:
  # ── Livite Hub — single service (Flask + Next.js static + Outreach CRM) ──
  - type: web
    name: livite-hub
    runtime: python
    rootDir: .
    buildCommand: >
      cd web && npm install && npm run build && cd .. &&
      cd outreach/frontend && npm install && npm run build && cd ../.. &&
      pip install -r requirements.txt
    startCommand: gunicorn dashboard_app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2 --preload
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: HUB_API_KEY
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_GAMES_DB
        sync: false
      - key: NOTION_EMAIL_QUEUE_DB
        sync: false
      - key: NOTION_ORDERS_DB
        sync: false
      - key: AZURE_STORAGE_CONNECTION_STRING
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NOTION_ITEMS_DB_ID
        sync: false
      - key: NOTION_PRICES_DB_ID
        sync: false
      - key: NOTION_UPLOADS_DB_ID
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: NOTION_ORDERS_DB_ID
        sync: false
      # ── Outreach CRM env vars ──
      - key: OUTREACH_USERNAME
        sync: false
      - key: OUTREACH_PASSWORD
        sync: false
      - key: OUTREACH_CRON_KEY
        sync: false
      - key: NOTION_SCHOOLS_DB
        sync: false
      - key: NOTION_CONTACTS_DB
        sync: false
      - key: NOTION_TEMPLATES_DB
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FROM_NAME
        sync: false
