services:
  # ── Livite Hub — single service (Flask + Next.js static) ──
  - type: web
    name: livite-hub
    runtime: python
    rootDir: .
    buildCommand: >
      cd web && npm install && npm run build && cd .. &&
      pip install -r requirements.txt
    startCommand: gunicorn dashboard_app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2 --preload
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: HUB_API_KEY
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_GAMES_DB
        sync: false
      - key: NOTION_EMAIL_QUEUE_DB
        sync: false
      - key: NOTION_ORDERS_DB
        sync: false
      - key: AZURE_STORAGE_CONNECTION_STRING
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NOTION_ITEMS_DB_ID
        sync: false
      - key: NOTION_PRICES_DB_ID
        sync: false
      - key: NOTION_UPLOADS_DB_ID
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: NOTION_ORDERS_DB_ID
        sync: false

  # ── CRM cron is now served by livite-hub at /hub/cron ──
  # livite-crm service removed — consolidated to save costs and fix cold start delays.
  # Point cron-job.org to: https://<livite-hub-url>/hub/cron?api_key=<HUB_API_KEY>
  # Add these env vars to livite-hub if not already present:
  #   NOTION_CONTACTS_DB, NOTION_TEMPLATES_DB, NOTION_SCHOOLS_DB,
  #   NOTION_CATERING_ORDERS_DS, NOTION_CATERING_ORDERS_DB,
  #   NOTION_DASHBOARD_CONTACTS_DB, FROM_EMAIL, FROM_NAME,
  #   GMAIL_TOKEN_JSON, GOOGLE_CREDENTIALS_JSON
